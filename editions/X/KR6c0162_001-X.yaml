body:
  text: 明李卓吾撰心經者佛說心之徑要也心本無有而世人妄以為有亦無無而學者執以為無有無分而能所立是自罣礙也自恐怖也自顛倒也安得自在獨不觀於自在菩薩乎彼其智慧行深既到自在彼岸矣斯時也自然照見色受想行識五蘊皆空本無生死可得故能出離生死苦海而度脫一切苦厄焉此一經之總要也下文重重說破皆以明此故遂呼而告之曰舍利子勿謂吾說空便即著空也如我說色不異於空也如我說空不異於色也然但言不異猶是二物有對雖復合而為一猶存一也其實我所說色即是說空色之外無空矣我所說空即是說色空之外無色矣非但無色而亦無空此真空也故又呼而告之曰舍利子是諸法空相無空可名何況更有生滅垢淨增減名相是故色本不生空本不滅說色非垢說空非淨在色不增在空不減非億之也空中原無是耳是故五蘊皆空無色受想行識也六根皆空無眼耳鼻舌身意也六塵皆空無色聲香味觸法也十八界皆空無眼界乃至無意識界也以至生老病死明與無明四諦智證等皆無所得此自在菩薩智慧觀照到無所得之彼岸也如此所得既無自然無罣礙恐怖與夫顛倒夢想矣現視生死而究竟涅槃矣豈惟菩薩雖過去現在未來三世諸佛亦以此智慧得到彼岸共成無上正等正覺焉耳則信乎盡大地眾生無有不是佛者乃知此真空妙智是大神呪是大明呪是無上呪是無等等呪能出離生死苦海度脫一切苦厄真實不虗也然則空之難言也久矣執色者泥色說空者滯空及至兩無所依則又一切撥無因果不信經中分明讚嘆空即是色更有何空色即是空更有何色無空無色尚何有有有無於我罣礙而不得自在耶然則觀者但以自家智慧時常觀照則彼岸當自得之矣菩薩豈異人哉但能一觀照之焉耳人人皆菩薩而不自見也故言菩薩則人人一矣無聖愚也言三世諸佛則古今一矣無先後也奈之何可使由而不可使知者眾也可使知則為菩薩不可使知則為凡民為禽獸為木石卒歸於泯泯爾矣
